<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supporting Documents — Trip Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sd-header h2 {
            margin: 0;
        }

        .sd-header .trip-info {
            font-size: 14px;
            color: #666;
        }

        .sd-status {
            margin-left: 10px;
        }

        .sd-form {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .sd-form h3 {
            margin: 0 0 16px 0;
            font-size: 1.1em;
            color: #495057;
        }

        .sd-form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
        }

        .sd-form-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        .sd-summary {
            background: #e8f4f8;
            border: 1px solid #b8d4e3;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sd-summary .label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px;
        }

        .sd-summary .amount {
            font-size: 22px;
            font-weight: 700;
            color: #27ae60;
        }

        .sd-readonly-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #856404;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .doc-actions {
            white-space: nowrap;
        }

        .doc-actions button {
            margin-right: 4px;
        }

        .file-link {
            color: #007bff;
            text-decoration: none;
            font-size: 13px;
        }

        .file-link:hover {
            text-decoration: underline;
        }

        .sd-back {
            margin-bottom: 16px;
            display: inline-block;
        }

        .sd-edit-id {
            display: none;
        }

        .text-right {
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="container container-wide">
        <header class="app-header">
            <h1 class="app-title">Trip Manager — Supporting Documents</h1>
            <div class="user-bar">
                <span class="user-label">Signed in as</span>
                <span id="navUser" class="nav-user"></span>
                <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">Log out</button>
            </div>
        </header>

        <div class="page-section">
            <a href="/" class="sd-back btn btn-secondary btn-sm">← Back to Trips</a>

            <div class="sd-header">
                <div>
                    <h2>Supporting Documents</h2>
                    <div class="trip-info" id="tripInfo">Loading trip info...</div>
                </div>
                <div>
                    <span id="sdTripStatus" class="status-badge status-pending"></span>
                </div>
            </div>

            <div id="sdReadonlyBanner" class="sd-readonly-banner hidden">
                🔒 This trip has been approved. Documents are in read-only mode.
            </div>

            <!-- Add / Edit Form -->
            <div id="sdForm" class="sd-form hidden">
                <h3 id="sdFormTitle">Add New Document</h3>
                <input type="hidden" id="sdEditId" value="">
                <div class="sd-form-grid">
                    <div class="form-group">
                        <label>Date<span class="required-mark">*</span></label>
                        <input type="date" id="sdDate" required>
                    </div>
                    <div class="form-group">
                        <label>Description<span class="required-mark">*</span></label>
                        <input type="text" id="sdDescription" placeholder="Enter description" required>
                    </div>
                    <div class="form-group">
                        <label>Bill ID<span class="required-mark">*</span></label>
                        <input type="text" id="sdBillId" placeholder="Enter bill ID" required>
                    </div>
                    <div class="form-group">
                        <label>Category<span class="required-mark">*</span></label>
                        <select id="sdCategory" required>
                            <option value="">-- Select --</option>
                            <option value="Travel">Travel</option>
                            <option value="Accommodation">Accommodation</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Stationery">Stationery</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bill Amount (INR)<span class="required-mark">*</span></label>
                        <input type="number" id="sdBillAmount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Page No. (Auto)</label>
                        <input type="number" id="sdPageNo" readonly style="background:#e9ecef; cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Attach PDF (optional)</label>
                        <input type="file" id="sdFile" accept="application/pdf" style="font-size:13px;">
                    </div>
                </div>
                <div class="sd-form-actions">
                    <button type="button" class="btn btn-primary" id="sdSaveBtn">Add Document</button>
                    <button type="button" class="btn btn-secondary" id="sdCancelBtn">Cancel</button>
                </div>
                <div id="sdFormError" class="form-error" role="alert" hidden></div>
            </div>

            <!-- Summary -->
            <div class="sd-summary">
                <span class="label">Total Claim Amount</span>
                <span class="amount" id="sdTotalAmount">₹ 0.00</span>
            </div>

            <!-- Documents Table -->
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Page No.</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Bill ID</th>
                            <th>Category</th>
                            <th>Amount (INR)</th>
                            <th>Attachment</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sdDocList"></tbody>
                </table>
            </div>
            <div style="margin-top: 16px; display: flex; gap: 10px;">
                <button type="button" class="btn btn-primary" id="sdAddNewBtn">+ Add New Document</button>
                <button type="button" class="btn btn-approve" id="sdSubmitApprovalBtn">Submit for Approval</button>
            </div>
        </div>
    </div>

    <script src="js/session-manager.js"></script>
    <script src="js/supporting-docs.js?v=11"></script>
</body>

</html>
