<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Supporting Documents — Trip Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px
        }

        .sd-header h2 {
            margin: 0
        }

        .sd-header .trip-info {
            font-size: 14px;
            color: #666
        }

        .sd-status {
            margin-left: 10px
        }

        .sd-form {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 24px
        }

        .sd-form h3 {
            margin: 0 0 16px 0;
            font-size: 1.1em;
            color: #495057
        }

        .sd-form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px
        }

        .sd-form-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px
        }

        .sd-summary {
            background: #e8f4f8;
            border: 1px solid #b8d4e3;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .sd-summary .label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 16px
        }

        .sd-summary .amount {
            font-size: 22px;
            font-weight: 700;
            color: #27ae60
        }

        .sd-readonly-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-weight: 600;
            color: #856404
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px
        }

        .doc-actions {
            white-space: nowrap
        }

        .doc-actions button {
            margin-right: 4px
        }

        .file-link {
            color: #007bff;
            text-decoration: none;
            font-size: 13px
        }

        .file-link:hover {
            text-decoration: underline
        }

        .sd-back {
            margin-bottom: 16px;
            display: inline-block
        }

        .sd-edit-id {
            display: none
        }

        .text-right {
            text-align: right
        }
    </style>
</head>

<body>
    <div class="container container-wide">
        <header class="app-header">
            <h1 class="app-title">Trip Manager — Supporting Documents</h1>
            <div class="user-bar">
                <span class="user-label">Signed in as</span>
                <span id="navUser" class="nav-user"></span>
                <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">Log out</button>
            </div>
        </header>

        <div class="page-section">
            <a href="/" class="sd-back btn btn-secondary btn-sm">&larr; Back to Trips</a>

            <div class="sd-header">
                <div>
                    <h2>Supporting Documents</h2>
                    <div class="trip-info" id="tripInfo">Loading trip info...</div>
                </div>
                <div>
                    <span id="sdTripStatus" class="status-badge status-pending"></span>
                </div>
            </div>

            <div id="sdReadonlyBanner" class="sd-readonly-banner hidden">
                &#128274; This trip has been approved. Documents are in read-only mode.
            </div>

            <div id="sdForm" class="sd-form hidden">
                <h3 id="sdFormTitle">Add New Document</h3>
                <input type="hidden" id="sdEditId" value="">
                <div class="sd-form-grid">
                    <div class="form-group">
                        <label>Date<span class="required-mark">*</span></label>
                        <input type="date" id="sdDate" required>
                    </div>
                    <div class="form-group">
                        <label>Description<span class="required-mark">*</span></label>
                        <input type="text" id="sdDescription" placeholder="Enter description" required>
                    </div>
                    <div class="form-group">
                        <label>Bill ID<span class="required-mark">*</span></label>
                        <input type="text" id="sdBillId" placeholder="Enter bill ID" required>
                    </div>
                    <div class="form-group">
                        <label>Category<span class="required-mark">*</span></label>
                        <select id="sdCategory" required>
                            <option value="">-- Select --</option>
                            <option value="Travel">Travel</option>
                            <option value="Accommodation">Accommodation</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Stationery">Stationery</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bill Amount (INR)<span class="required-mark">*</span></label>
                        <input type="number" id="sdBillAmount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Page No. (Auto)</label>
                        <input type="number" id="sdPageNo" readonly style="background:#e9ecef;cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Attach PDF (optional)</label>
                        <input type="file" id="sdFile" accept="application/pdf" style="font-size:13px;">
                    </div>
                </div>
                <div class="sd-form-actions">
                    <button type="button" class="btn btn-primary" id="sdSaveBtn">Add Document</button>
                    <button type="button" class="btn btn-secondary" id="sdCancelBtn">Cancel</button>
                </div>
                <div id="sdFormError" class="form-error" role="alert" hidden></div>
            </div>

            <div class="sd-summary">
                <span class="label">Total Claim Amount</span>
                <span class="amount" id="sdTotalAmount">&#8377; 0.00</span>
            </div>

            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Page No.</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Bill ID</th>
                            <th>Category</th>
                            <th>Amount (INR)</th>
                            <th>Attachment</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sdDocList"></tbody>
                </table>
            </div>
            <div style="margin-top:16px;display:flex;gap:10px;">
                <button type="button" class="btn btn-primary" id="sdAddNewBtn">+ Add New Document</button>
                <button type="button" class="btn btn-approve" id="sdSubmitApprovalBtn">Submit for Approval</button>
            </div>
        </div>
    </div>

    <script src="js/session-manager.js"></script>
    <script>
        var API_URL = '/api/trips';
        var currentTripId = new URLSearchParams(window.location.search).get('invoice');
        var sdDocuments = [];
        var sdEditingId = null;
        var role = (sessionStorage.getItem('role') || '').toLowerCase();
        var isApprover = role === 'approver';

        function fmtDate(d) { if (!d) return ''; var dt = new Date(d); if (isNaN(dt)) return d; return dt.toISOString().split('T')[0]; }
        function fmtCurr(v) { return '₹ ' + (Number(v) || 0).toFixed(2); }

        (function checkAuth() {
            var u = sessionStorage.getItem('user') || localStorage.getItem('user');
            if (!u) { window.location.href = 'login.html'; return; }
            try { var up = JSON.parse(u); document.getElementById('navUser').textContent = up.displayName || up.username || up.email || up.user || 'User'; } catch (e) { document.getElementById('navUser').textContent = 'User'; }
            var lo = document.getElementById('logoutBtn');
            if (lo) lo.addEventListener('click', function () { sessionStorage.clear(); localStorage.clear(); window.location.href = 'login.html'; });
        })();

        (async function loadTripInfo() {
            if (!currentTripId) { document.getElementById('tripInfo').textContent = 'Error: No invoice selected.'; return; }
            try {
                var resp = await fetch(API_URL + '/' + encodeURIComponent(currentTripId));
                if (!resp.ok) { document.getElementById('tripInfo').textContent = 'Trip not found (HTTP ' + resp.status + ')'; return; }
                var trip = await resp.json();
                document.getElementById('tripInfo').innerHTML = 'Invoice: <strong>' + (trip.yantrikiInvoiceNumber || currentTripId) + '</strong> &mdash; ' + (trip.reason || '') + ' &mdash; Claimant: <strong>' + (trip.claimant || 'N/A') + '</strong>';
                if (trip.workflowStatus) {
                    document.getElementById('sdTripStatus').textContent = trip.workflowStatus;
                    document.getElementById('sdTripStatus').className = 'status-badge status-' + trip.workflowStatus.toLowerCase().replace(/\s+/g, '-');
                }
                var locked = trip.submittedForApproval || trip.workflowStatus === 'Submitted for Approval' || trip.workflowStatus === 'Approved';
                if (locked) {
                    document.getElementById('sdReadonlyBanner').classList.remove('hidden');
                    document.getElementById('sdAddNewBtn').style.display = 'none';
                }
                if (isApprover) document.getElementById('sdSubmitApprovalBtn').style.display = 'none';
                loadDocuments();
            } catch (e) { document.getElementById('tripInfo').textContent = 'Error: ' + e.message; }
        })();

        async function loadDocuments() {
            if (!currentTripId) return;
            try {
                var resp = await fetch(API_URL + '/' + encodeURIComponent(currentTripId) + '/documents');
                if (!resp.ok) return;
                sdDocuments = await resp.json();
                renderDocuments();
            } catch (e) { console.error(e); }
        }

        function renderDocuments() {
            var tb = document.getElementById('sdDocList');
            if (!tb) return;
            if (!sdDocuments || !sdDocuments.length) {
                tb.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;">No documents added yet.</td></tr>';
                document.getElementById('sdTotalAmount').textContent = '₹ 0.00';
                return;
            }
            var h = '', total = 0;
            sdDocuments.forEach(function (doc, idx) {
                total += Number(doc.billAmount) || 0;
                h += '<tr>';
                h += '<td>' + (doc.pageNo || (idx + 1)) + '</td>';
                h += '<td>' + fmtDate(doc.date) + '</td>';
                h += '<td>' + (doc.description || '') + '</td>';
                h += '<td>' + (doc.billId || '') + '</td>';
                h += '<td>' + (doc.category || '') + '</td>';
                h += '<td>' + fmtCurr(doc.billAmount) + '</td>';
                h += '<td>' + (doc.fileData ? '<a href="' + doc.fileData + '" target="_blank" class="file-link">View PDF</a>' : '<span style="color:#999;font-size:12px;">No file</span>') + '</td>';
                var readOnly = document.getElementById('sdReadonlyBanner') && !document.getElementById('sdReadonlyBanner').classList.contains('hidden');
                h += '<td class="doc-actions">';
                if (!readOnly) {
                    h += '<button class="btn btn-sm btn-secondary" onclick="editDoc(\'' + doc.id + '\')">Edit</button> ';
                    h += '<button class="btn btn-sm btn-danger" onclick="deleteDoc(\'' + doc.id + '\')">Delete</button>';
                } else {
                    h += '<span style="color:#999;font-size:12px;">Read-only</span>';
                }
                h += '</td></tr>';
            });
            tb.innerHTML = h;
            document.getElementById('sdTotalAmount').textContent = fmtCurr(total);
        }

        document.getElementById('sdAddNewBtn').addEventListener('click', function () {
            sdEditingId = null;
            document.getElementById('sdFormTitle').textContent = 'Add New Document';
            document.getElementById('sdSaveBtn').textContent = 'Add Document';
            document.getElementById('sdForm').classList.remove('hidden');
            document.getElementById('sdEditId').value = '';
            document.getElementById('sdDate').value = '';
            document.getElementById('sdDescription').value = '';
            document.getElementById('sdBillId').value = '';
            document.getElementById('sdCategory').value = '';
            document.getElementById('sdBillAmount').value = '';
            document.getElementById('sdPageNo').value = sdDocuments.length + 1;
            document.getElementById('sdFile').value = '';
            document.getElementById('sdFormError').hidden = true;
        });

        document.getElementById('sdCancelBtn').addEventListener('click', function () {
            document.getElementById('sdForm').classList.add('hidden');
        });

        window.editDoc = function (id) {
            var doc = sdDocuments.find(function (d) { return d.id == id; });
            if (!doc) return;
            sdEditingId = id;
            document.getElementById('sdFormTitle').textContent = 'Edit Document';
            document.getElementById('sdSaveBtn').textContent = 'Update Document';
            document.getElementById('sdForm').classList.remove('hidden');
            document.getElementById('sdEditId').value = id;
            document.getElementById('sdDate').value = fmtDate(doc.date);
            document.getElementById('sdDescription').value = doc.description || '';
            document.getElementById('sdBillId').value = doc.billId || '';
            document.getElementById('sdCategory').value = doc.category || '';
            document.getElementById('sdBillAmount').value = doc.billAmount || '';
            document.getElementById('sdPageNo').value = doc.pageNo || '';
            document.getElementById('sdFile').value = '';
            document.getElementById('sdFormError').hidden = true;
        };

        window.deleteDoc = async function (id) {
            if (!confirm('Delete this document?')) return;
            try {
                var resp = await fetch(API_URL + '/' + encodeURIComponent(currentTripId) + '/documents/' + encodeURIComponent(id), { method: 'DELETE' });
                if (!resp.ok) { alert('Delete failed'); return; }
                loadDocuments();
            } catch (e) { alert('Error: ' + e.message); }
        };

        document.getElementById('sdSaveBtn').addEventListener('click', async function () {
            var date = document.getElementById('sdDate').value;
            var description = document.getElementById('sdDescription').value.trim();
            var billId = document.getElementById('sdBillId').value.trim();
            var category = document.getElementById('sdCategory').value;
            var billAmount = document.getElementById('sdBillAmount').value;
            var pageNo = document.getElementById('sdPageNo').value;
            var fileInput = document.getElementById('sdFile');
            var errEl = document.getElementById('sdFormError');

            errEl.hidden = true;
            if (!date || !description || !billId || !category || !billAmount) {
                errEl.textContent = 'Please fill all required fields.';
                errEl.hidden = false;
                return;
            }
            if (!currentTripId) { errEl.textContent = 'No trip selected.'; errEl.hidden = false; return; }

            var payload = { date: date, description: description, billId: billId, category: category, billAmount: billAmount, pageNo: pageNo };
            if (fileInput && fileInput.files && fileInput.files[0]) {
                var file = fileInput.files[0];
                if (file.type !== 'application/pdf') { errEl.textContent = 'Only PDF files are allowed.'; errEl.hidden = false; return; }
                var reader = new FileReader();
                reader.onload = async function (e) {
                    payload.fileData = e.target.result;
                    await saveDoc(payload, errEl);
                };
                reader.readAsDataURL(file);
            } else {
                await saveDoc(payload, errEl);
            }
        });

        async function saveDoc(payload, errEl) {
            try {
                var url = API_URL + '/' + encodeURIComponent(currentTripId) + '/documents';
                var method = 'POST';
                if (sdEditingId) { url += '/' + encodeURIComponent(sdEditingId); method = 'PUT'; }
                var resp = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!resp.ok) { var d = await resp.json(); errEl.textContent = d.error || 'Save failed'; errEl.hidden = false; return; }
                document.getElementById('sdForm').classList.add('hidden');
                loadDocuments();
            } catch (e) { errEl.textContent = 'Error: ' + e.message; errEl.hidden = false; }
        }

        // ----- Submit for Approval button logic -----
        (function () {
            var btn = document.getElementById('sdSubmitApprovalBtn');
            if (!btn) return;
            if (isApprover) { btn.style.display = 'none'; return; }

            var currentUser = null;
            try {
                var u = JSON.parse(sessionStorage.getItem('user') || localStorage.getItem('user'));
                if (u) currentUser = u.username || u.displayName || u.email || u.user;
            } catch (e) { }

            btn.addEventListener('click', async function () {
                if (!currentTripId) { alert('No trip selected.'); return; }
                if (!currentUser) { alert('User not identified. Please log in.'); return; }
                if (!confirm('Submit this trip for approval? Documents will be locked for editing.')) return;

                btn.disabled = true;
                btn.textContent = 'Submitting...';

                try {
                    var resp = await fetch('/api/trips/' + encodeURIComponent(currentTripId) + '/submit-approval', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ submittedBy: currentUser })
                    });
                    var data = await resp.json();
                    if (!resp.ok) {
                        alert('Submit failed: ' + (data.error || resp.statusText));
                        btn.disabled = false;
                        btn.textContent = 'Submit for Approval';
                        return;
                    }
                    alert('Trip submitted for approval successfully! An email notification has been sent.');
                    window.location.href = '/';
                } catch (err) {
                    alert('Network error: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'Submit for Approval';
                }
            });
        })();
    </script>
</body>

</html>
