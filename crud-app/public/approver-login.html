<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approver Sign in — Trip Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">
    <div class="login-card">
        <h1 class="login-title">Trip Manager</h1>
        <p class="login-subtitle">Approver Portal</p>
        <p class="login-description">Sign in to approve or reject trip records.</p>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="loginUsername">Username<span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="loginUsername" name="username" autocomplete="username" required autofocus
                    placeholder="Enter approver username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password<span class="required-mark" aria-hidden="true">*</span></label>
                <input type="password" id="loginPassword" name="password" autocomplete="current-password" required
                    placeholder="Enter password">
            </div>
            <div id="loginError" class="form-error" role="alert" hidden></div>
            <button type="submit" class="btn btn-primary login-submit">Sign in as Approver</button>
        </form>
        <div class="login-footer">
            <p><a href="login.html">Regular user login</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('loginError');
            err.hidden = true;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password, portal: 'approver' })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    // Check if user is an approver or admin
                    if (data.role === 'approver' || data.role === 'admin') {
                        window.location.href = '/approver.html';
                    } else {
                        err.textContent = 'You do not have approver permissions.';
                        err.hidden = false;
                    }
                    return;
                }
                err.textContent = data.error || 'Sign in failed.';
                err.hidden = false;
            } catch (ex) {
                err.textContent = 'Network error. Try again.';
                err.hidden = false;
            }
        });
    </script>
</body>

</html>
