<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Trip Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-links {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .login-links p {
            margin: 8px 0;
        }

        .login-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
        }

        .login-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="login-body">
    <div class="login-card">
        <h1 class="login-title">Trip Manager</h1>
        <p class="login-subtitle">Sign in with your username and password.</p>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="loginUsername">Username<span class="required-mark" aria-hidden="true">*</span></label>
                <input type="text" id="loginUsername" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password<span class="required-mark" aria-hidden="true">*</span></label>
                <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
            </div>
            <div class="form-group"
                style="flex-direction: row; align-items: center; gap: 8px; margin-top: 8px; margin-bottom: 16px;">
                <input type="checkbox" id="showPassword"
                    style="width: auto !important; padding: 0 !important; cursor: pointer;">
                <label for="showPassword"
                    style="margin: 0; font-size: 0.9em; font-weight: normal; cursor: pointer; user-select: none;">Show
                    Password</label>
            </div>
            <div id="loginError" class="form-error" role="alert" hidden></div>
            <button type="submit" class="btn btn-primary login-submit">Sign in</button>
        </form>
        <div class="login-links">
            <p><a href="approver-login.html">Go to Approver Portal →</a></p>
        </div>
    </div>
    <script>
        document.getElementById('showPassword').addEventListener('change', function () {
            const passField = document.getElementById('loginPassword');
            if (this.checked) {
                passField.type = 'text';
            } else {
                passField.type = 'password';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('loginError');
            err.hidden = true;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password, portal: 'regular' })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    // Redirect approver/admin users to approver dashboard
                    const role = (data.role || '').toLowerCase();
                    if (role === 'approver' || role === 'admin') {
                        window.location.href = '/approver.html';
                    } else {
                        window.location.href = '/';
                    }
                    return;
                }
                err.textContent = data.error || 'Sign in failed.';
                err.hidden = false;
            } catch (ex) {
                err.textContent = 'Network error. Try again.';
                err.hidden = false;
            }
        });
    </script>
</body>

</html>
