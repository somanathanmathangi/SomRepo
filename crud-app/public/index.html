<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Trip Manager</h1>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" id="tabShowAll">Show all Trips</button>
            <button class="tab-btn" id="tabRecord">Record Trip</button>
            <button class="tab-btn" id="tabSearch">Search Trip</button>
        </nav>

        <!-- Search Section -->
        <section id="sectionSearch" class="page-section hidden">
            <div class="search-section">
                <div class="search-field-wrap">
                    <label for="searchInput">Search<span class="required-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="searchInput" placeholder="Invoice No, person, or trip code…" aria-required="true" autocomplete="off">
                    <div id="searchError" class="inline-error" role="alert" hidden></div>
                </div>
                <div class="search-actions">
                    <button type="button" class="btn btn-primary" onclick="searchTrips()">Search</button>
                    <button type="button" class="btn btn-secondary" id="clearSearch" onclick="clearSearchAndFetch()">Reset</button>
                </div>
            </div>
        </section>

        <!-- Record Section -->
        <section id="sectionRecord" class="page-section hidden">
            <div class="form-section">
                <h3 id="formTitle">Record New Trip</h3>
                <input type="hidden" id="tripId">
                <div class="form-group form-group-date">
                    <label for="invoiceDate">Invoice Date<span class="required-mark" aria-hidden="true">*</span></label>
                    <div class="date-field">
                        <span class="date-field-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                        </span>
                        <input type="date" id="invoiceDate" class="input-date" autocomplete="off" aria-required="true">
                    </div>
                </div>
                <div class="form-group">
                    <label for="invoiceNo">Invoice No<span class="required-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="invoiceNo" placeholder="Enter Invoice Number" aria-required="true" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="travellingPerson">Travelling Person<span class="required-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="travellingPerson" placeholder="Enter Person Name" aria-required="true" autocomplete="off">
                </div>
                <div class="form-group form-group-date">
                    <label for="travelDate">Travel Date<span class="required-mark" aria-hidden="true">*</span></label>
                    <div class="date-field">
                        <span class="date-field-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                        </span>
                        <input type="date" id="travelDate" class="input-date" autocomplete="off" aria-required="true">
                    </div>
                </div>
                <div id="formError" class="form-error" role="alert" hidden></div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="addBtn" onclick="createTrip()">Add Trip Record</button>
                    <button class="btn btn-update" id="updateBtn" onclick="updateTrip()">Update Trip Record</button>
                    <button class="btn btn-secondary" id="clearBtn" onclick="resetForm()">Clear Fields</button>
                    <button class="btn btn-cancel" id="cancelBtn" onclick="showSection('showAll')">Back to List</button>
                </div>
            </div>
        </section>

        <!-- Table Section -->
        <section id="sectionShowAll" class="page-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Trip Code</th>
                            <th>Invoice Date</th>
                            <th>Invoice No</th>
                            <th>Travelling Person</th>
                            <th>Travel Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tripList">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
