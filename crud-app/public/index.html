<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container container-wide">
        <header class="app-header">
            <h1 class="app-title">Trip Manager</h1>
            <div class="user-bar">
                <span class="user-label">Signed in as</span>
                <span id="navUser" class="nav-user"></span>
                <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">Log out</button>
            </div>
        </header>

        <nav class="tabs">
            <button type="button" class="tab-btn active" id="tabShowAll">Show all Trips</button>
            <button type="button" class="tab-btn" id="tabRecord">Record Trip</button>
            <button type="button" class="tab-btn" id="tabSearch">Search Trip</button>
        </nav>

        <section id="sectionSearch" class="page-section hidden">
            <div class="search-section">
                <div class="search-field-wrap">
                    <label for="searchInput">Search<span class="required-mark" aria-hidden="true">*</span></label>
                    <input type="text" id="searchInput" placeholder="Invoice #, customer, PO, traveller, route, WO…"
                        aria-required="true" autocomplete="off">
                    <div id="searchError" class="inline-error" role="alert" hidden></div>
                </div>
                <div class="search-actions">
                    <button type="button" class="btn btn-primary" onclick="searchTrips()">Search</button>
                    <button type="button" class="btn btn-secondary" id="clearSearch"
                        onclick="clearSearchAndFetch()">Reset</button>
                </div>
            </div>
        </section>

        <section id="sectionRecord" class="page-section hidden">
            <div class="form-section form-section-wide">
                <h3 id="formTitle">Record New Trip</h3>
                <input type="hidden" id="editingInvoiceKey" value="">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="customerName">Customer Name<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <select id="customerName" aria-required="true">
                            <option value="">-- Select Customer --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="customerLocation">Customer Location<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <select id="customerLocation" aria-required="true">
                            <option value="">-- Select Location --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="poOrder">PO Order<span class="required-mark" aria-hidden="true">*</span></label>
                        <input type="text" id="poOrder" aria-required="true" autocomplete="off">
                    </div>
                    <div class="form-group form-group-date">
                        <label for="poDate">PO Date<span class="required-mark" aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="poDate" class="input-date" autocomplete="off" aria-required="true">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="travellerName">Traveller Name<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <input type="text" id="travellerName" aria-required="true" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="travelRoute">Travel Route<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <input type="text" id="travelRoute" aria-required="true" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="woNumber">WO Number<span class="required-mark" aria-hidden="true">*</span></label>
                        <input type="text" id="woNumber" aria-required="true" autocomplete="off">
                    </div>
                    <div class="form-group form-group-date">
                        <label for="woDate">WO Date<span class="required-mark" aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="woDate" class="input-date" autocomplete="off" aria-required="true">
                        </div>
                    </div>
                    <div class="form-group form-group-date">
                        <label for="travelStartDate">Travel Start Date<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="travelStartDate" class="input-date" autocomplete="off"
                                aria-required="true">
                        </div>
                    </div>
                    <div class="form-group form-group-date">
                        <label for="travelEndDate">Travel End Date<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="travelEndDate" class="input-date" autocomplete="off"
                                aria-required="true">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="yantrikiInvoiceNumber">Yantriki Invoice Number<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <input type="text" id="yantrikiInvoiceNumber" aria-required="true" autocomplete="off" />
                    </div>
                    <div class="form-group form-group-date">
                        <label for="woStartDate">WO Start Date<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="woStartDate" class="input-date" autocomplete="off"
                                aria-required="true">
                        </div>
                    </div>
                    <div class="form-group form-group-date">
                        <label for="woEndDate">WO End Date<span class="required-mark"
                                aria-hidden="true">*</span></label>
                        <div class="date-field">
                            <span class="date-field-icon" aria-hidden="true">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" />
                                    <path d="M16 2v4M8 2v4M3 10h18" />
                                </svg>
                            </span>
                            <input type="date" id="woEndDate" class="input-date" autocomplete="off"
                                aria-required="true">
                        </div>
                    </div>


                    <div class="form-group">
                        <label for="pkReadonlyHint" class="field-hint hidden" id="pkReadonlyHint">Primary key — cannot
                            be changed while editing.</label>
                    </div>
                </div>

                <div id="formError" class="form-error" role="alert" hidden></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" id="addBtn" onclick="createTrip()">Add Trip
                        Record</button>
                    <button type="button" class="btn btn-update" id="updateBtn" onclick="updateTrip()">Update Trip
                        Record</button>
                    <button type="button" class="btn btn-secondary" id="clearBtn" onclick="resetForm()">Clear
                        Fields</button>
                    <button type="button" class="btn btn-cancel" id="cancelBtn" onclick="showSection('showAll')">Back to
                        List</button>
                </div>
            </div>
        </section>

        <section id="sectionShowAll" class="page-section">
            <div id="adminTripsActions" class="admin-actions-bar hidden" style="margin-bottom: 12px; display: flex; justify-content: flex-end;">
                <button type="button" class="btn btn-delete btn-sm" id="deleteAllTripsBtn" onclick="deleteAllTrips()">Delete All Trips</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="yantriki_invoice_number">Yantriki Inv.</th>
                            <th class="sortable" data-sort="customer_name">Customer</th>
                            <th class="sortable" data-sort="customer_location">Location</th>
                            <th class="sortable" data-sort="po_order">PO Order</th>
                            <th class="sortable" data-sort="po_date">PO Date</th>
                            <th class="sortable" data-sort="traveller_name">Traveller</th>
                            <th class="sortable" data-sort="travel_route">Route</th>
                            <th class="sortable" data-sort="wo_number">WO #</th>
                            <th class="sortable" data-sort="wo_date">WO Date</th>
                            <th class="sortable" data-sort="wo_start_date">WO Start</th>
                            <th class="sortable" data-sort="wo_end_date">WO End</th>
                            <th class="sortable" data-sort="travel_start_date">Start</th>
                            <th class="sortable" data-sort="travel_end_date">End</th>
                            <th class="sortable" data-sort="created_by">Created By</th>
                            <th class="sortable" data-sort="created_date">Created</th>
                            <th class="sortable" data-sort="updated_by">Updated By</th>
                            <th class="sortable" data-sort="updated_date">Updated</th>
                            <th>Supporting Docs</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable" data-sort="approved_by">Approved By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tripList"></tbody>
                </table>
            </div>
            <div class="pagination-container" id="pagination">
                <!-- Pagination buttons injected here -->
            </div>
        </section>
    </div>

    <script src="js/session-manager.js"></script>
    <script src="js/app.js?v=5"></script>
</body>

</html>
